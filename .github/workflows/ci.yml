name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint RTL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Verilator lint
        run: |
          shopt -s globstar nullglob
          pkg=(rtl/common/*.sv)
          mods=(rtl/alpha_engine/*.sv rtl/order_book/*.sv rtl/parser/*.sv \
                rtl/risk_gateway/*.sv rtl/rx_mac/*.sv rtl/top/*.sv rtl/tx_gen/*.sv)
          if [ ${#mods[@]} -eq 0 ]; then
            echo "No RTL sources yet, skipping."
            exit 0
          fi
          verilator --lint-only -Wall \
            -Wno-UNUSEDSIGNAL -Wno-UNUSEDPARAM -Wno-UNDRIVEN \
            --top-module commontrader_top \
            "${pkg[@]}" "${mods[@]}"
        shell: bash
